<!doctype html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <link rel="shortcut icon" href="../favicon/16px.png" sizes="16x16" type="image/png">
    <link rel="shortcut icon" href="../favicon/32px.png" sizes="32x32" type="image/png">
    <link rel="shortcut icon" href="../favicon/64px.png" sizes="64x64" type="image/png">
    <link rel="shortcut icon" href="../favicon/128px.png" sizes="128x128" type="image/png">
    <title>Up1234me</title>
    <link rel="stylesheet" href="../css/up1.css">
    <script>
        window.onunload = function () { }
    </script>
</head>

<body>
    <div class="topbar">
        <span class="btn flexele">Admin & upload requires authentication</span>.
        <a class="btn flexele" id="newupload" href="/#">New Upload</a>
    </div>
    <div class="contentarea" >
        <div class="flexele row">Total File count:<div id="totalfilecount"></div></div>
        <div class="flexele row">Total size:<div id="totalsize"></div></div>
        <div class="flexele row">File list:
            <button class="btn" id="prev" type="button">Prev</button>            
            <button class="btn" id="next" type="button">Next</button>         
        </div>
        <table id="filelist" class="flexele"></table>
        <!-- <div class="flexele" id="filelist"></div> -->
    </div>
    <div id="bottombar">
        <button class="btn flexele" id="deleteallbefore" type="button">Delete all before date</button>            
    </div>

    <noscript class="noscript">
        <h2>
            The client side cryptography of this application requires that Javascript be enabled to view and upload
            files.
        </h2>
    </noscript>

    <div id="footer" class="footer">
        <a href="https://github.com/wolfgangasdf" target="_blank">Up1234me</a>
    </div>
    <script type="module" src="../js/admin.js"></script>
</body>

</html>
